<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Budget app 2026 Django edition" />

    <title>Budget {% block title%}{% endblock title %}</title>

    <!-- Favicon -->
    {% comment %} <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" /> {% endcomment %}

    <!-- CSS -->
    {% comment %} <link rel="stylesheet" href="styles.css" /> {% endcomment %}
    {% block styles %}{% endblock styles %}
  </head>
  <body>

    <header>
      <nav><!-- navigation --></nav>
    </header>

    <main>
        {% block content %}<p>Main content</p>{% endblock content %}
    </main>

    <footer>
      <!-- footer content -->
    </footer>

    <!-- Scripts (deferred) -->
    {% comment %} <script src="app.js" defer></script> {% endcomment %}
    {% block scripts %}{% endblock scripts %}
  </body>
</html>
